<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Iron Dome – 3D Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            bisbg: '#181818',
            bistxt: '#ffe066',
            bisborder: '#ffe066',
            bisaccent: '#fffbe6',
            bisbtn: '#181818',
            bisbtnhover: '#ffe066',
            bisbtntext: '#ffe066',
            bisbtnhovertext: '#181818',
          },
          boxShadow: {
            'bis-glow': '0 0 8px 2px #ffe06688',
          },
        },
      },
    }
  </script>

<style>
/* CSS 그대로 (변경 없음) */
</style>
</head>

<body class="m-0 overflow-hidden bg-bisbg text-bistxt font-mono">

<div id="ui-panel" class="bis-panel absolute top-4 left-4 w-[420px] max-h-[95vh] flex flex-col">
<h3 class="bis-title border-b-2 border-bisborder pb-2 mb-4">INTERCEPTION SIMULATION</h3>

<div class="flex-1 overflow-y-auto pr-2">

<div class="mb-4">
<button class="w-full flex items-center justify-between bis-btn mb-2" onclick="toggleSection('target-section')">
<span class="bis-label text-lg">TARGET (MISSILE)</span>
<span id="target-arrow">▼</span>
</button>

<div id="target-section" class="space-y-3">

<label class="bis-label block">Initial velocity (m/s)
<input type="number" id="targetSpeed" value="900" min="100" max="3000" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Launch angle (°)
<input type="number" id="targetAngle" value="35" min="10" max="80" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Mass (kg)
<input type="number" id="targetMass" value="1200" min="100" max="10000" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Drag coefficient Cd
<input type="number" id="targetCd" value="0.15" min="0.05" max="1" step="0.05" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Cross-sectional area S (m²)
<input type="number" id="targetArea" value="0.8" min="0.1" max="10" step="0.1" class="bis-input w-full mt-1">
</label>

</div>
</div>

<hr class="bis-hr">

<div class="mb-4">
<button class="w-full flex items-center justify-between bis-btn mb-2" onclick="toggleSection('interceptor-section')">
<span class="bis-label text-lg">INTERCEPTOR</span>
<span id="interceptor-arrow">▼</span>
</button>

<div id="interceptor-section" class="space-y-3">

<label class="bis-label block">Mass (kg)
<input type="number" id="mass" value="400" min="100" max="5000" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Drag coefficient Cd
<input type="number" id="cd" value="0.2" min="0.05" max="1" step="0.05" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Cross-sectional area S (m²)
<input type="number" id="area" value="0.4" min="0.1" max="5" step="0.1" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Thrust force (N)
<input type="number" id="thrust" value="30000" min="1000" max="50000" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Burn time (s)
<input type="number" id="burn" value="60" min="1" max="30" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Initial velocity (m/s)
<input type="number" id="v0" value="1" min="10" max="500" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Kill radius (m)
<input type="number" id="killRadius" value="20" min="10" max="500" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Max corrections
<input type="number" id="maxCorrections" value="900000" min="1" max="100" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Maneuverability (°/s)
<input type="number" id="maneuverability" value="280" min="5" max="180" class="bis-input w-full mt-1">
</label>

</div>
</div>

<hr class="bis-hr">

<div class="mb-4">
<button class="w-full flex items-center justify-between bis-btn mb-2" onclick="toggleSection('physics-section')">
<span class="bis-label text-lg">ATMOSPHERE & PHYSICS</span>
<span id="physics-arrow">▼</span>
</button>

<div id="physics-section" class="space-y-3">

<label class="bis-label block">Atmosphere model
<select id="atmosphereModel" class="bis-input w-full mt-1">
<option value="exponential">Exponential (barometric)</option>
<option value="none">No atmosphere (vacuum)</option>
</select>
</label>

<label class="bis-label block">Atmosphere height (m)
<input type="number" id="atmosphereHeight" value="9000" min="1000" max="20000" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Sea-level density (kg/m³)
<input type="number" id="rho0" value="1.225" min="0.5" max="2" step="0.001" class="bis-input w-full mt-1">
</label>

<label class="bis-label block">Gravity (m/s²)
<input type="number" id="gravity" value="9.81" min="1" max="20" step="0.01" class="bis-input w-full mt-1">
</label>

</div>
</div>

<div class="space-y-2 mt-4">

<div class="flex items-center justify-between">
<label class="bis-label" for="showPrediction">Show lead point</label>
<input type="checkbox" id="showPrediction" checked class="accent-bisborder w-5 h-5">
</div>

<div class="flex items-center justify-between">
<label class="bis-label" for="showTrajectories">Show trajectories</label>
<input type="checkbox" id="showTrajectories" checked class="accent-bisborder w-5 h-5">
</div>

<div class="flex items-center justify-between">
<label class="bis-label" for="showPhases">Interceptor phases</label>
<input type="checkbox" id="showPhases" checked class="accent-bisborder w-5 h-5">
</div>

</div>

<div class="mt-4 space-y-3">

<div class="flex items-center gap-2">
<div class="flex-1">
<label class="bis-label block mb-1">Intercept type</label>
<select id="interceptType" class="bis-input w-full">
<option value="trajectory">Trajectory</option>
<option value="lead">Lead interception</option>
</select>
</div>
<button id="toggle-constants" class="bis-btn w-10 h-10 flex items-center justify-center text-2xl ml-2" title="System constants">⚙️</button>
</div>

<div>
<label class="bis-label block mb-1">Maximum interceptors</label>
<select id="maxInterceptors" class="bis-input w-full">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5" selected>5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>
</div>

</div>
</div>

<div class="mt-6 pt-6 border-t-2 border-bisborder space-y-3">

<div class="flex space-x-3">
<button id="startBtn" class="bis-btn flex-1">🚀 LAUNCH TARGET</button>
<button id="pauseBtn" class="bis-btn flex-1">⏸ PAUSE</button>
</div>

<button id="launchInterceptor" disabled class="bis-btn w-full">+ LAUNCH INTERCEPTOR</button>
<button id="resetBtn" class="bis-btn w-full">↺ RESET SIMULATION</button>

</div>
</div>

<div id="stats-panel" class="bis-panel absolute top-4 right-4 w-[340px] text-sm">

<h3 class="bis-title border-b-2 border-bisborder pb-2 mb-4">STATISTICS</h3>

<div class="space-y-2">

<div class="flex justify-between items-center">
<span class="bis-label">Time:</span>
<span class="font-bold bis-glow" id="target-time">0.0 s</span>
</div>

<div class="flex justify-between items-center">
<span class="bis-label">Target altitude:</span>
<span class="font-bold bis-glow" id="target-height">0 m</span>
</div>

<div class="flex justify-between items-center">
<span class="bis-label">Target velocity:</span>
<span class="font-bold bis-glow" id="target-velocity">0 m/s</span>
</div>

<div class="flex justify-between items-center">
<span class="bis-label">Hit probability:</span>
<span class="font-bold bis-glow" id="hit-chance">-</span>
</div>

<div class="flex justify-between items-center">
<span class="bis-label">Distance:</span>
<span class="font-bold bis-glow" id="target-distance">0 m</span>
</div>

<div class="flex justify-between items-center">
<span class="bis-label">Active interceptors:</span>
<span class="font-bold bis-glow" id="active-interceptors">0</span>
</div>

</div>
</div>

<script src="simulation.js"></script>

</body>
</html>
